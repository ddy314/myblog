name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Set Nuxt base URL
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          OWNER_NAME="${{ github.repository_owner }}"
          if [ "$REPO_NAME" = "$OWNER_NAME.github.io" ]; then
            echo "NUXT_APP_BASE_URL=/" >> "$GITHUB_ENV"
            echo "NUXT_PUBLIC_SITE_URL=https://$OWNER_NAME.github.io/" >> "$GITHUB_ENV"
          else
            echo "NUXT_APP_BASE_URL=/$REPO_NAME/" >> "$GITHUB_ENV"
            echo "NUXT_PUBLIC_SITE_URL=https://$OWNER_NAME.github.io/$REPO_NAME/" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./.output/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
